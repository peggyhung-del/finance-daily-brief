name: Daily Finance Brief

on:
  schedule:
    # 00:30 UTC = 08:30 台灣時間 (UTC+8)
    - cron: '30 0 * * *'
  workflow_dispatch:  # 允許從 GitHub UI 手動觸發

permissions:
  contents: write

jobs:
  update-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run daily brief update
        run: python scripts/update_brief.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Finance Brief Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html history.json
          if ! git diff --staged --quiet; then
            DATESTAMP=$(TZ='Asia/Taipei' date +%Y-%m-%d)
            git commit -m "update: ${DATESTAMP} daily brief"
            git push
          else
            echo "No changes to commit"
          fi
